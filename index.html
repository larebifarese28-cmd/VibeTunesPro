<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirPods Pro | عرض حصري</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f9f9f9; color: #333; line-height: 1.6; }
        header { background: #000; color: white; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        img { width: 100%; max-width: 300px; border-radius: 10px; margin-bottom: 20px; }
        h2 { color: #d32f2f; margin-bottom: 10px; }
        .price { font-size: 28px; font-weight: bold; color: #1DB954; margin: 15px 0; }
        .features { text-align: right; margin: 20px 0; padding-right: 20px; }
        .features li { list-style: none; margin-bottom: 10px; font-size: 18px; }
        .features li::before { content: "✅ "; }
        .btn-buy { background: #25D366; color: white; text-decoration: none; padding: 15px 30px; border-radius: 50px; display: inline-block; font-size: 20px; font-weight: bold; transition: 0.3s; }
        .btn-buy:hover { transform: scale(1.05); background: #128C7E; }
    </style>
</head>
<body>
    <header><h1>متجر النخبة الإلكتروني</h1></header>
    <div class="container">
        <img src="https://www.apple.com/v/airpods-pro/h/images/overview/magsafe_case__f8n6n9h8f46q_large.png" alt="AirPods Pro">
        <h2>AirPods Pro (الجيل الثاني)</h2>
        <p>عزل ضجيج خيالي، وصوت نقي يخليك في عالم آخر.</p>
        <ul class="features">
            <li>بطارية تدوم 30 ساعة</li>
            <li>مقاومة للماء والعرق</li>
            <li>شحن لاسلكي سريع</li>
        </ul>
        <div class="price">12,500 دج <span style="text-decoration: line-through; color: #777; font-size: 16px;">18,000 دج</span></div>
        <a href="https://wa.me/213000000000?text=حاب+نطلب+سماعات+AirPods" class="btn-buy">اطلب الآن عبر واتساب</a>
    </div>
</body>
</html>
