<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Tunes Pro | GitHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .search-box { background: #181818; border-radius: 25px; padding: 10px 20px; display: flex; align-items: center; max-width: 500px; margin: 0 auto 20px; border: 1px solid #1DB954; }
        .search-box input { background: none; border: none; color: white; flex: 1; outline: none; text-align: right; padding: 5px; }
        .song-card { background: #121212; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; border-radius: 10px; border: 1px solid #282828; }
        .song-card:hover { background: #282828; }
        .song-info { flex: 1; text-align: right; margin-right: 15px; }
        .play-btn { color: #1DB954; font-size: 30px; cursor: pointer; }
        #player-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #1DB954; padding: 10px; display: none; }
    </style>
</head>
<body>
    <h1 style="color:#1DB954"><i class="fas fa-headphones"></i> VIBE TUNES PRO</h1>
    <div class="search-box">
        <input type="text" id="query" placeholder="ابحث عن أغنية أو فنان...">
        <i class="fas fa-search" style="color:#1DB954; cursor:pointer;" onclick="searchSongs()"></i>
    </div>
    <div id="results"></div>
    <div id="player-container">
        <audio id="audio-player" controls style="width: 100%;"></audio>
    </div>

    <script>
        async function searchSongs() {
            const query = document.getElementById('query').value;
            if(!query) return;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "<p>جاري البحث عن أغانيك... ⏳</p>";
            
            try {
                // استخدام API خارجي لجلب بيانات اليوتيوب مباشرة
                const response = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=music_videos`);
                const data = await response.json();
                
                resultsDiv.innerHTML = "";
                data.items.forEach(song => {
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    const videoId = song.url.split('=')[1];
                    card.innerHTML = `
                        <div class="song-info"><strong>${song.title || song.name}</strong></div>
                        <i class="fas fa-play-circle play-btn" onclick="playSong('${videoId}')"></i>
                    `;
                    resultsDiv.appendChild(card);
                });
            } catch (err) {
                resultsDiv.innerHTML = "<p style='color:red;'>حدث خطأ في جلب البيانات، جرب مرة أخرى.</p>";
            }
        }

        async function playSong(id) {
            const playerContainer = document.getElementById('player-container');
            const audioPlayer = document.getElementById('audio-player');
            playerContainer.style.display = "block";
            
            try {
                const res = await fetch(`https://pipedapi.kavin.rocks/streams/${id}`);
                const data = await res.json();
                const audioUrl = data.audioStreams.find(s => s.format === 'M4A' || s.format === 'WEBM').url;
                audioPlayer.src = audioUrl;
                audioPlayer.play();
            } catch (err) {
                alert("تعذر تشغيل هذه الأغنية.");
            }
        }
    </script>
</body>
</html>
